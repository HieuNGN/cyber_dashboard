apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cybersec-dashboard
  namespace: cybersec-dashboard
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: dashboard.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cybersec-dashboard
                port:
                  number: 8080
