apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-config
  namespace: cybersec-dashboard
data:
  HOST: "0.0.0.0"
  PORT: "8080"
  UPDATE_INTERVAL_HOURS: "12"
  TIMEZONE: "Asia/Bangkok"
  FETCH_ON_STARTUP: "true"
  STARTUP_STALENESS_MINUTES: "30"
  DATABASE_PATH: "/app/data/dashboard.db"
  OBSIDIAN_VAULT_PATH: "/app/data/obsidian"
  FETCH_HACKERNEWS: "true"
  FETCH_BLEEPINGCOMPUTER: "true"
  FETCH_KREBS: "true"
  FETCH_CISA_KEV: "true"
  FETCH_TOMSHARDWARE: "true"
  FETCH_SERVETHEHOME: "true"
  FETCH_WCCFTECH: "true"
  FETCH_THEREGISTER: "true"
